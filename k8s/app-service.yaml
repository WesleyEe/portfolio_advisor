apiVersion: v1
kind: Service
metadata:
  name: portfolio-advisor
  namespace: portfolio-advisor
spec:
  selector:
    app: portfolio-advisor
  ports:
    - name: http
      port: 80
      targetPort: 8000
  # ClusterIP for prod (put an Ingress in front).
  # Change to LoadBalancer for quick local testing via OrbStack's LB support.
  type: ClusterIP
