apiVersion: v1
kind: Service
metadata:
  name: portfolio-advisor
  namespace: portfolio-advisor
spec:
  selector:
    app: portfolio-advisor
  ports:
    - name: http
      port: 80
      targetPort: 8000
  # ClusterIP — external access goes through the Ingress (see k8s/app-ingress.yaml).
  type: ClusterIP
