apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: portfolio-advisor
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
  # ClusterIP so only pods inside the cluster can reach Ollama.
  # Never expose this externally — it has no auth.
  type: ClusterIP
