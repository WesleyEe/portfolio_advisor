# Tempo replaces Jaeger as the trace backend — same OTLP ingestion the app
# already speaks, but native Grafana integration (trace<->log<->metric
# correlation) instead of a separate standalone UI. Monolithic mode with
# local filesystem storage: traces are lost on pod restart, which is fine
# for a dev cluster; point storage.trace.backend at s3/gcs for real retention.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: portfolio-advisor
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      trace_idle_period: 10s

    compactor:
      compaction:
        block_retention: 24h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: portfolio-advisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.0
          args:
            - "-config.file=/etc/tempo/tempo.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: http
              containerPort: 3200
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: tempo-config
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: portfolio-advisor
spec:
  selector:
    app: tempo
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: http
      port: 3200
      targetPort: 3200
  # ClusterIP — Tempo has no standalone UI worth exposing; it's queried
  # through Grafana's Tempo datasource (see k8s/grafana-datasources-configmap.yaml).
  type: ClusterIP
